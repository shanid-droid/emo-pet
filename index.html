<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EMO Pet Control</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

:root {
  --bg:     #060608;
  --card:   #0a0a0f;
  --border: #141420;
  --green:  #00ff99;
  --purple: #a044ff;
  --red:    #ff4455;
  --orange: #ffaa00;
  --dim:    #222;
  --dimmer: #111;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: #fff;
  font-family: 'Space Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 16px 48px;
  overflow-x: hidden;
}

/* ── Header ── */
.header {
  width: 100%;
  max-width: 380px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 12px;
}
.logo { font-size: 1.3rem; font-weight: 700; letter-spacing: 6px; }
.logo span { color: var(--green); }
.conn-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--dim);
  transition: background .4s;
  box-shadow: 0 0 0 0 transparent;
}
.conn-dot.on {
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulse-dot 2s infinite;
}
.conn-dot.err { background: var(--red); }
@keyframes pulse-dot {
  0%,100% { box-shadow: 0 0 4px var(--green); }
  50%      { box-shadow: 0 0 12px var(--green); }
}

/* ── Pet selector bar ── */
.pet-bar {
  width: 100%; max-width: 380px;
  display: flex; gap: 6px; margin-bottom: 14px;
  overflow-x: auto; padding-bottom: 2px;
}
.pet-chip {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-family: 'Space Mono', monospace;
  font-size: .6rem;
  letter-spacing: 1px;
  color: var(--dim);
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
  display: flex; align-items: center; gap: 6px;
}
.pet-chip:hover { border-color: var(--green); color: var(--green); }
.pet-chip.active { border-color: var(--green); color: var(--green); background: #00ff9910; }
.pet-chip .del {
  color: #333; font-size: .7rem; line-height: 1;
  padding: 0 2px; cursor: pointer;
}
.pet-chip .del:hover { color: var(--red); }
.add-pet {
  background: transparent;
  border: 1px dashed #1a1a2e;
  border-radius: 20px;
  padding: 6px 14px;
  font-family: 'Space Mono', monospace;
  font-size: .6rem;
  letter-spacing: 1px;
  color: #1a1a2e;
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
}
.add-pet:hover { border-color: var(--purple); color: var(--purple); }

/* ── Add pet modal ── */
.modal-bg {
  display: none;
  position: fixed; inset: 0;
  background: #000a;
  z-index: 100;
  align-items: center; justify-content: center;
}
.modal-bg.show { display: flex; }
.modal {
  background: #0d0d14;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px;
  width: 90%; max-width: 320px;
}
.modal h2 { font-size: .9rem; letter-spacing: 3px; margin-bottom: 20px; color: var(--green); }
.modal label { font-size: .55rem; letter-spacing: 2px; color: #444; display: block; margin-bottom: 6px; margin-top: 14px; }
.modal input {
  width: 100%; background: var(--bg);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--green); padding: 11px;
  font-family: 'Space Mono', monospace; font-size: .8rem; outline: none;
}
.modal input:focus { border-color: #00ff9944; }
.modal-btns { display: flex; gap: 8px; margin-top: 20px; }
.mbtn {
  flex: 1; padding: 11px;
  border-radius: 8px; cursor: pointer;
  font-family: 'Space Mono', monospace; font-size: .65rem; letter-spacing: 1px;
}
.mbtn-ok  { background: #00ff9915; border: 1px solid #00ff9944; color: var(--green); }
.mbtn-can { background: transparent; border: 1px solid var(--border); color: #444; }

/* ── OLED preview canvas ── */
.oled-wrap {
  position: relative;
  width: 260px; height: 130px;
  margin: 0 auto 20px;
}
.oled {
  width: 260px; height: 130px;
  background: #000;
  border-radius: 14px;
  border: 2px solid #0f0f18;
  box-shadow: 0 0 30px #00ff9908, inset 0 0 20px #000;
  overflow: hidden;
}
canvas { display: block; }
.oled-glare {
  position: absolute; top: 8px; left: 12px;
  width: 60px; height: 14px;
  background: linear-gradient(135deg, #ffffff08, transparent);
  border-radius: 4px;
  pointer-events: none;
}

/* ── IP connect bar ── */
.ip-bar {
  width: 100%; max-width: 380px;
  display: flex; gap: 6px; margin-bottom: 18px;
}
.ip-in {
  flex: 1; background: var(--card);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--green); padding: 10px 12px;
  font-family: 'Space Mono', monospace; font-size: .75rem; outline: none;
}
.ip-in:focus { border-color: #00ff9933; }
.ip-btn {
  background: #00ff9912; border: 1px solid #00ff9933; border-radius: 8px;
  color: var(--green); padding: 10px 14px; cursor: pointer;
  font-family: 'Space Mono', monospace; font-size: .6rem; letter-spacing: 1px;
  transition: all .15s;
}
.ip-btn:hover { background: #00ff9920; }
.ip-btn:active { transform: scale(.95); }

/* ── Stats ── */
.stats { width: 100%; max-width: 380px; margin-bottom: 18px; }
.stat { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
.sl { font-size: .55rem; letter-spacing: 2px; color: #333; width: 54px; }
.tr { flex: 1; height: 4px; background: #0d0d0d; border-radius: 2px; overflow: hidden; }
.fi { height: 100%; border-radius: 2px; transition: width .5s; }
.fh { background: linear-gradient(90deg, #ff4455, #ffaa00); }
.fj { background: linear-gradient(90deg, var(--green), #00ccff); }
.fe { background: linear-gradient(90deg, var(--purple), #ff44aa); }
.sv { font-size: .55rem; color: #222; width: 22px; text-align: right; }

/* ── Section label ── */
.sec {
  font-size: .5rem; letter-spacing: 3px; color: #1a1a24;
  width: 100%; max-width: 380px; margin-bottom: 7px;
}

/* ── Action buttons ── */
.acts {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 7px; width: 100%; max-width: 380px; margin-bottom: 16px;
}
.ab {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 4px;
  cursor: pointer; text-align: center; transition: all .15s;
}
.ab:hover { border-color: #00ff9933; background: #00ff9906; }
.ab:active { transform: scale(.94); }
.ab .i { font-size: .75rem; color: var(--green); display: block; margin-bottom: 4px; font-style: italic; }
.ab .l { font-size: .5rem; letter-spacing: 1px; color: #333; }

/* ── Mood grid ── */
.mg {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 6px; width: 100%; max-width: 380px; margin-bottom: 16px;
}
.mb {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 2px;
  cursor: pointer; text-align: center; transition: all .15s;
}
.mb:hover { border-color: #00ff9922; }
.mb:active { transform: scale(.93); }
.mb .i { font-size: .65rem; color: #444; display: block; margin-bottom: 3px; font-family: 'Space Mono', monospace; }
.mb .l { font-size: .45rem; letter-spacing: 1px; color: #222; }
.mb.on { border-color: var(--green); }
.mb.on .i { color: var(--green); }
.mb.on .l { color: var(--green); }

/* ── Look pad ── */
.lp {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 6px; width: 100%; max-width: 380px; margin-bottom: 16px;
}
.lb {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; cursor: pointer;
  text-align: center; font-size: .7rem; color: #2a2a3a;
  transition: all .15s;
}
.lb:hover { border-color: #a044ff44; color: var(--purple); }
.lb:active { transform: scale(.93); }
.lc { background: #0d0d14; color: #333; }

/* ── Rename ── */
.nr { display: flex; gap: 7px; width: 100%; max-width: 380px; margin-bottom: 16px; }
.ni {
  flex: 1; background: var(--card);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--green); padding: 10px 12px;
  font-family: 'Space Mono', monospace; font-size: .75rem; outline: none;
}
.ni:focus { border-color: #00ff9933; }
.ns {
  background: #00ff9910; border: 1px solid #00ff9925; border-radius: 8px;
  color: var(--green); padding: 10px 12px; cursor: pointer;
  font-family: 'Space Mono', monospace; font-size: .6rem; letter-spacing: 1px;
  transition: all .15s;
}
.ns:hover { background: #00ff9920; }

/* ── Log ── */
.log {
  width: 100%; max-width: 380px;
  background: var(--card); border: 1px solid var(--dimmer);
  border-radius: 8px; padding: 10px 14px;
  font-size: .55rem; color: #1a1a1a; min-height: 30px;
  letter-spacing: 1px;
}
.log .m { color: var(--green); }
.log .e { color: var(--red); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">E<span>M</span>O</div>
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:.5rem;letter-spacing:2px;color:#222" id="connlabel">OFFLINE</span>
    <div class="conn-dot" id="dot"></div>
  </div>
</div>

<!-- Pet selector -->
<div class="pet-bar" id="petBar"></div>

<!-- Add pet modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2>ADD PET</h2>
    <label>PET NAME</label>
    <input type="text" id="mName" placeholder="e.g. EMO2" maxlength="12">
    <label>ESP32 IP ADDRESS</label>
    <input type="text" id="mIp" placeholder="e.g. 192.168.1.105">
    <div class="modal-btns">
      <button class="mbtn mbtn-can" onclick="closeModal()">CANCEL</button>
      <button class="mbtn mbtn-ok"  onclick="addPet()">ADD</button>
    </div>
  </div>
</div>

<!-- OLED Preview -->
<div class="oled-wrap">
  <div class="oled"><canvas id="cv" width="260" height="130"></canvas></div>
  <div class="oled-glare"></div>
</div>

<!-- IP bar -->
<div class="ip-bar">
  <input class="ip-in" id="ipIn" placeholder="ESP32 IP e.g. 192.168.1.105">
  <button class="ip-btn" onclick="connectIP()">CONNECT</button>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat">
    <span class="sl">HUNGER</span>
    <div class="tr"><div class="fi fh" id="fh" style="width:80%"></div></div>
    <span class="sv" id="vh">80</span>
  </div>
  <div class="stat">
    <span class="sl">HAPPY</span>
    <div class="tr"><div class="fi fj" id="fj" style="width:80%"></div></div>
    <span class="sv" id="vj">80</span>
  </div>
  <div class="stat">
    <span class="sl">ENERGY</span>
    <div class="tr"><div class="fi fe" id="fe" style="width:80%"></div></div>
    <span class="sv" id="ve">80</span>
  </div>
</div>

<!-- Actions -->
<div class="sec">ACTIONS</div>
<div class="acts">
  <div class="ab" onclick="act('feed')">
    <span class="i">[ F ]</span><span class="l">FEED</span></div>
  <div class="ab" onclick="act('play')">
    <span class="i">[ P ]</span><span class="l">PLAY</span></div>
  <div class="ab" onclick="act('sleep')">
    <span class="i">[ Z ]</span><span class="l">SLEEP</span></div>
</div>

<!-- Mood -->
<div class="sec">MOOD</div>
<div class="mg" id="mg">
  <div class="mb" data-mood="normal"    onclick="setMood('normal')">
    <span class="i">(-.-)</span><span class="l">NORMAL</span></div>
  <div class="mb" data-mood="happy"     onclick="setMood('happy')">
    <span class="i">(^v^)</span><span class="l">HAPPY</span></div>
  <div class="mb" data-mood="sad"       onclick="setMood('sad')">
    <span class="i">(;_;)</span><span class="l">SAD</span></div>
  <div class="mb" data-mood="angry"     onclick="setMood('angry')">
    <span class="i">(>.&lt;)</span><span class="l">ANGRY</span></div>
  <div class="mb" data-mood="surprised" onclick="setMood('surprised')">
    <span class="i">(oOo)</span><span class="l">WOW</span></div>
  <div class="mb" data-mood="sleepy"    onclick="setMood('sleepy')">
    <span class="i">( -- )</span><span class="l">SLEEPY</span></div>
  <div class="mb" data-mood="love"      onclick="setMood('love')">
    <span class="i">(&lt;3)</span><span class="l">LOVE</span></div>
  <div class="mb" data-mood="confused"  onclick="setMood('confused')">
    <span class="i">(?._)</span><span class="l">HUH</span></div>
</div>

<!-- Look -->
<div class="sec">LOOK DIRECTION</div>
<div class="lp">
  <div class="lb" onclick="look(-6,-3)">NW</div>
  <div class="lb" onclick="look(0,-3)">N</div>
  <div class="lb" onclick="look(6,-3)">NE</div>
  <div class="lb" onclick="look(-6,0)">W</div>
  <div class="lb lc" onclick="look(0,0)">*</div>
  <div class="lb" onclick="look(6,0)">E</div>
  <div class="lb" onclick="look(-6,3)">SW</div>
  <div class="lb" onclick="look(0,3)">S</div>
  <div class="lb" onclick="look(6,3)">SE</div>
</div>

<!-- Rename -->
<div class="nr">
  <input class="ni" id="ni" placeholder="Rename pet..." maxlength="12">
  <button class="ns" onclick="rename()">SET</button>
</div>

<!-- Log -->
<div class="log" id="log"><span class="m">> Select a pet or enter IP to connect</span></div>

<script>
// ── State ───────────────────────────────────────────────────────
let espIP   = '';
let pets    = [];   // [{name, ip}]
let activePet = -1;
let connected = false;
let pollTimer = null;

let cvState  = {mood:'normal'};
let lx=0, ly=0;
let blinkT=0, blink=0;

// Love animation state
let loveActive  = false;
let loveFrames  = 0;
let hearts      = [];
let sparkAngle  = 0;
let eyeScale    = 1.0;
let scaleDir    = 1;

// ── Persistence ─────────────────────────────────────────────────
function savePets() {
  localStorage.setItem('emo_pets', JSON.stringify(pets));
  localStorage.setItem('emo_active', activePet);
}
function loadPets() {
  try {
    pets = JSON.parse(localStorage.getItem('emo_pets') || '[]');
    activePet = parseInt(localStorage.getItem('emo_active') || '-1');
  } catch(e) { pets = []; activePet = -1; }
}

// ── Pet bar render ───────────────────────────────────────────────
function renderPetBar() {
  const bar = document.getElementById('petBar');
  bar.innerHTML = '';
  pets.forEach((p, i) => {
    const chip = document.createElement('div');
    chip.className = 'pet-chip' + (i === activePet ? ' active' : '');
    chip.innerHTML = p.name +
      '<span class="del" onclick="event.stopPropagation();removePet('+i+')">x</span>';
    chip.onclick = () => selectPet(i);
    bar.appendChild(chip);
  });
  const add = document.createElement('button');
  add.className = 'add-pet';
  add.textContent = '+ ADD PET';
  add.onclick = openModal;
  bar.appendChild(add);
}

function selectPet(i) {
  activePet = i;
  espIP = pets[i].ip;
  document.getElementById('ipIn').value = espIP;
  savePets();
  renderPetBar();
  connect();
}

function removePet(i) {
  pets.splice(i, 1);
  if (activePet >= pets.length) activePet = pets.length - 1;
  savePets();
  renderPetBar();
  if (activePet >= 0) selectPet(activePet);
}

// ── Modal ────────────────────────────────────────────────────────
function openModal()  { document.getElementById('modalBg').classList.add('show'); }
function closeModal() { document.getElementById('modalBg').classList.remove('show'); }

function addPet() {
  const name = document.getElementById('mName').value.trim();
  const ip   = document.getElementById('mIp').value.trim();
  if (!name || !ip) return;
  pets.push({name, ip});
  activePet = pets.length - 1;
  savePets();
  renderPetBar();
  closeModal();
  selectPet(activePet);
  document.getElementById('mName').value = '';
  document.getElementById('mIp').value   = '';
}

// ── IP connect ───────────────────────────────────────────────────
function connectIP() {
  const ip = document.getElementById('ipIn').value.trim();
  if (!ip) return;
  espIP = ip;
  // Check if already in pets, if not add automatically
  const exists = pets.findIndex(p => p.ip === ip);
  if (exists === -1) {
    pets.push({name: 'EMO', ip});
    activePet = pets.length - 1;
    savePets();
    renderPetBar();
  } else {
    activePet = exists;
    savePets();
    renderPetBar();
  }
  connect();
}

function connect() {
  if (pollTimer) clearInterval(pollTimer);
  api('/status').then(() => {
    pollTimer = setInterval(() => api('/status'), 4000);
  });
}

// ── API ──────────────────────────────────────────────────────────
async function api(path) {
  if (!espIP) {
    log('Enter ESP32 IP first', true);
    return;
  }
  try {
    const r = await fetch('http://' + espIP + path);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    updateUI(j);
    setConnected(true);
    return j;
  } catch(e) {
    setConnected(false);
    log('Cannot reach ' + espIP, true);
  }
}

function act(a)     { api('/cmd?a=' + a); }
function setMood(m) { lx=0; ly=0; if(m==='love') triggerLove(); api('/mood?m=' + m); }
function look(x,y)  { lx=x; ly=y; api('/look?x='+x+'&y='+y); }
function rename()   {
  const n = document.getElementById('ni').value.trim();
  if (!n) return;
  api('/rename?n=' + encodeURIComponent(n)).then(j => {
    if (j && activePet >= 0) {
      pets[activePet].name = n;
      savePets(); renderPetBar();
    }
  });
}

// ── UI update ────────────────────────────────────────────────────
function updateUI(j) {
  cvState = j;
  document.getElementById('fh').style.width = j.hunger + '%';
  document.getElementById('fj').style.width = j.happiness + '%';
  document.getElementById('fe').style.width = j.energy + '%';
  document.getElementById('vh').textContent  = j.hunger;
  document.getElementById('vj').textContent  = j.happiness;
  document.getElementById('ve').textContent  = j.energy;
  if (j.msg) log('> ' + j.msg);
  document.querySelectorAll('.mb').forEach(b =>
    b.classList.toggle('on', b.dataset.mood === j.mood));
  if (j.mood === 'love' && !loveActive) triggerLove();
  // update pet name in bar if changed
  if (j.name && activePet >= 0 && pets[activePet]) {
    pets[activePet].name = j.name;
    renderPetBar();
  }
}

function setConnected(ok) {
  connected = ok;
  const dot   = document.getElementById('dot');
  const label = document.getElementById('connlabel');
  dot.className   = 'conn-dot' + (ok ? ' on' : ' err');
  label.textContent = ok ? 'ONLINE' : 'OFFLINE';
}

function log(msg, err=false) {
  document.getElementById('log').innerHTML =
    '<span class="' + (err?'e':'m') + '">' + msg + '</span>';
}

// ── Canvas eye renderer ──────────────────────────────────────────
const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
const SC  = 260/128;   // scale 128->260

function drawEyeC(cx, cy, w, h, pdx, pdy, mood, isLeft) {
  cx*=SC; cy*=SC; w*=SC; h*=SC; pdx*=SC; pdy*=SC;
  const hw=w/2, hh=h/2;
  ctx.fillStyle = '#fff';

  if (mood === 'blink') {
    ctx.beginPath(); ctx.roundRect(cx-hw, cy-3*SC, w, 6*SC, 3*SC); ctx.fill(); return;
  }
  if (mood === 'love') {
    const s = (hw / 2) * eyeScale;
    ctx.beginPath(); ctx.arc(cx-s, cy-2*SC, s+2*SC, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s, cy-2*SC, s+2*SC, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx - s*2+SC, cy);
    ctx.lineTo(cx + s*2-SC, cy);
    ctx.lineTo(cx, cy + s*2);
    ctx.closePath(); ctx.fill(); return;
  }
  if (mood === 'normal') {
    ctx.beginPath(); ctx.roundRect(cx-hw,cy-hh,w,h,6*SC); ctx.fill();
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(cx+pdx,cy+pdy,6*SC,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx+pdx+2*SC,cy+pdy-2*SC,2*SC,0,Math.PI*2); ctx.fill();
  } else if (mood === 'happy') {
    ctx.beginPath(); ctx.arc(cx,cy+hh*0.1,hw,Math.PI,0); ctx.closePath(); ctx.fill();
  } else if (mood === 'sad') {
    const t = isLeft ? 4*SC : -4*SC;
    ctx.beginPath(); ctx.roundRect(cx-hw,cy-hh+t,w,h,6*SC); ctx.fill();
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(cx+pdx,cy+pdy+3*SC,6*SC,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx+pdx+2*SC,cy+pdy+SC,2*SC,0,Math.PI*2); ctx.fill();
  } else if (mood === 'angry') {
    ctx.beginPath(); ctx.roundRect(cx-hw,cy-hh,w,h,3*SC); ctx.fill();
    ctx.fillStyle='#000';
    if(isLeft) ctx.fillRect(cx-hw,cy-hh,hw,hh*0.8);
    else       ctx.fillRect(cx,   cy-hh,hw,hh*0.8);
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx+pdx,cy+pdy,6*SC,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(cx+pdx+2*SC,cy+pdy-2*SC,2*SC,0,Math.PI*2); ctx.fill();
  } else if (mood === 'surprised') {
    ctx.beginPath(); ctx.arc(cx,cy,hw,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(cx+pdx,cy+pdy,7*SC,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx+pdx+2*SC,cy+pdy-2*SC,2*SC,0,Math.PI*2); ctx.fill();
  } else if (mood === 'sleepy') {
    ctx.beginPath(); ctx.roundRect(cx-hw,cy-hh,w,h,6*SC); ctx.fill();
    ctx.fillStyle='#000'; ctx.fillRect(cx-hw-1,cy-hh-1,w+2,hh+2);
    ctx.beginPath(); ctx.arc(cx+pdx,cy+pdy+4*SC,5*SC,0,Math.PI*2); ctx.fill();
  } else if (mood === 'confused') {
    if (isLeft) {
      ctx.beginPath(); ctx.roundRect(cx-hw,cy-hh,w,h,6*SC); ctx.fill();
      ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(cx+pdx,cy+pdy,6*SC,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx+pdx+2*SC,cy+pdy-2*SC,2*SC,0,Math.PI*2); ctx.fill();
    } else {
      ctx.beginPath(); ctx.roundRect(cx-hw,cy-4*SC,w,8*SC,3*SC); ctx.fill();
    }
  }
}

// ── Love animations ──────────────────────────────────────────────
function triggerLove() {
  loveActive = true;
  loveFrames = 0;
  eyeScale   = 1.0;
  scaleDir   = 1;
  sparkAngle = 0;
  hearts = Array.from({length:8}, (_,i) => ({
    x: 20 + i * 28 + Math.random()*10,
    y: 100 + Math.random()*20,
    vy: 0.5 + Math.random()*0.8,
    size: 4 + Math.random()*5,
    alpha: 1.0,
    drift: (Math.random()-.5)*0.3
  }));
}

function drawHearts() {
  hearts.forEach(h => {
    h.y  -= h.vy;
    h.x  += h.drift;
    h.alpha = Math.max(0, h.alpha - 0.008);
    if (h.y < -10) { h.y = 120; h.alpha = 1.0; }
    const s = h.size;
    ctx.save();
    ctx.globalAlpha = h.alpha;
    ctx.fillStyle   = '#ff6699';
    ctx.beginPath(); ctx.arc(h.x - s/2, h.y, s, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(h.x + s/2, h.y, s, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(h.x - s, h.y + 2);
    ctx.lineTo(h.x + s, h.y + 2);
    ctx.lineTo(h.x,     h.y + s*2);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  });
}

function drawSparkles() {
  const eyeCx = [35*SC, 93*SC];
  const eyeCy = 34*SC;
  eyeCx.forEach(ex => {
    for (let p = 0; p < 6; p++) {
      const angle = sparkAngle + (p * Math.PI / 3);
      const r     = 22*SC;
      const sx    = ex + Math.cos(angle) * r;
      const sy    = eyeCy + Math.sin(angle) * r;
      const ss    = 2 + Math.sin(sparkAngle * 3 + p) * 1.5;
      ctx.save();
      ctx.globalAlpha = 0.7 + Math.sin(sparkAngle*2+p)*0.3;
      ctx.fillStyle   = p % 2 === 0 ? '#fff' : '#ffccee';
      ctx.beginPath(); ctx.arc(sx, sy, ss, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  });
  sparkAngle += 0.06;
}

function updateLovePulse() {
  eyeScale += scaleDir * 0.025;
  if (eyeScale > 1.25) scaleDir = -1;
  if (eyeScale < 0.8 ) scaleDir =  1;
  loveFrames++;
  if (loveFrames > 65) {
    loveActive = false;
    if (cvState.mood === 'love') cvState.mood = 'normal';
  }
}

// ── Render loop ──────────────────────────────────────────────────
function render() {
  ctx.clearRect(0,0,260,130);
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,260,130);

  let mood = cvState.mood || 'normal';

  if (loveActive) {
    drawHearts();
    drawSparkles();
    updateLovePulse();
    drawEyeC(35,34,28,28,lx,ly,'love',true);
    drawEyeC(93,34,28,28,lx,ly,'love',false);
  } else {
    const em = blink > 0 ? 'blink' : mood;
    drawEyeC(35,34,28,28,lx,ly,em,true);
    drawEyeC(93,34,28,28,lx,ly,em,false);
  }

  // Blink ticker
  blinkT++;
  if (blinkT > 20 + Math.random()*20) { blinkT=0; blink=4; }
  if (blink > 0) blink--;

  requestAnimationFrame(render);
}

// ── Init ─────────────────────────────────────────────────────────
loadPets();
renderPetBar();

// Restore last IP
if (activePet >= 0 && pets[activePet]) {
  espIP = pets[activePet].ip;
  document.getElementById('ipIn').value = espIP;
  connect();
}

render();
</script>
